# Suricata Auto Block Dashboard — by Levi (github.com/LEVI6957)
services:
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata_main
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./logs:/var/log/suricata # Mount log ke host
      - suricata-rules:/var/lib/suricata
      - suricata-config:/etc/suricata
    # Interface utama + loopback. Checksum dimatikan agar bisa mendeteksi serangan dari localhost
    command: -i ${NET_IFACE:-enp86s0} -i lo --set stream.checksum-validation=no

  evebox:
    image: jasonish/evebox:latest
    container_name: evebox_ui
    restart: on-failure
    user: "root"
    network_mode: "host"
    volumes:
      - ./logs:/var/log/suricata:ro # Baca log dari host (read-only)
      - evebox-data:/var/lib/evebox
    command: >
      evebox server --datastore sqlite --data-directory /var/lib/evebox --host 0.0.0.0 --no-auth --no-tls /var/log/suricata/eve.json
    depends_on:
      - suricata

  auto_block:
    build:
      context: ./auto_block
      dockerfile: Dockerfile
    container_name: auto_block
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN      # Diperlukan untuk iptables
      - NET_RAW
    privileged: true   # Diperlukan agar bisa akses iptables host
    volumes:
      - ./logs:/var/log/suricata:ro                          # Baca eve.json
      - ./auto_block/blocked_ips.log:/app/blocked_ips.log   # Log IP diblok
      - ./auto_block/alert_counts.json:/app/alert_counts.json # Sync state
      - ./dashboard/settings.json:/app/settings.json         # Baca setting dashboard
    environment:
      - EVE_LOG_PATH=/var/log/suricata/eve.json
      - BLOCK_THRESHOLD=${BLOCK_THRESHOLD:-3}
      - ALERT_SEVERITY=${ALERT_SEVERITY:-2}
      - WHITELIST_IPS=${WHITELIST_IPS:-}
      - DASHBOARD_URL=http://${SERVER_IP:-127.0.0.1}:${DASHBOARD_PORT:-8080}
    depends_on:
      - suricata

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: suricata_dashboard
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    privileged: true
    volumes:
      - ./logs:/var/log/suricata:ro                          # Baca eve.json
      - ./auto_block/blocked_ips.log:/app/blocked_ips.log   # Baca log IP diblok
      - ./auto_block/alert_counts.json:/app/alert_counts.json # Sync state
      - ./dashboard/settings.json:/app/settings.json         # Persistent settings
      - ./dashboard/whitelist.json:/app/whitelist.json
    environment:
      - EVE_LOG_PATH=/var/log/suricata/eve.json
      - BLOCKED_LOG=/app/blocked_ips.log
      - ALERT_COUNTS=/app/alert_counts.json
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-admin123}
    command: >
      uvicorn app:app --host ${SERVER_IP:-0.0.0.0} --port ${DASHBOARD_PORT:-8080} --log-level info
    depends_on:
      - suricata

volumes:
  suricata-rules:
  suricata-config:
  evebox-data:
